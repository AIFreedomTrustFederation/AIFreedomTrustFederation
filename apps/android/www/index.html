<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIFT Cloud</title>
  <style>
    :root { color: #eaf3ff; background: #07111f; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #173961, #07111f 55%, #03070d); }
    main { padding: 28px; }
    section { border: 1px solid rgba(255,255,255,.14); border-radius: 24px; padding: 24px; background: rgba(255,255,255,.07); }
    h1 { font-size: 2.8rem; line-height: .95; margin: 0 0 12px; }
    p { color: #c8d8ea; line-height: 1.6; }
    a { display: block; margin-top: 12px; padding: 14px 16px; border-radius: 999px; background: #8fd3ff; color: #06111f; font-weight: 800; text-align: center; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <section>
      <p>AIFT Cloud</p>
      <h1>Local-first node app</h1>
      <p>This Android shell is reserved for the installable AIFT Cloud app. Start your AIFT node, then open the local dashboard from inside the app.</p>
      <a href="http://127.0.0.1:3001/node-status">Open Local Node</a>
    </section>
  </main>
</body>
</html>
